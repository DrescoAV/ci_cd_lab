apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: go-simple-webserver
  labels:
    app: go-simple-webserver
spec:
  replicas: 10
  strategy:
    canary:
      steps:
        - setWeight: 25
        - pause:
            duration: 120s
        - setWeight: 75
        - pause:
            duration: 120s
        - setWeight: 100
  selector:
    matchLabels:
      app: go-simple-webserver
  template:
    metadata:
      labels:
        app: go-simple-webserver
    spec:
      containers:
        - name: webserver
          image: ghcr.io/DrescoAV/ci_cd_lab@sha256:edf0f6d5427ee31bb364d2bb46d83b71d8f0f55f8bb9c01dc8e13251906d23a0
          ports:
            - containerPort: 8080
          imagePullPolicy: Always
